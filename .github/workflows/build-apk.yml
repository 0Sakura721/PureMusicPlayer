name: Build APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK packages (API 36 / build-tools 36.0.0)
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 确保 debug keystore 存在（release 也用同一把 key 签名，免去手动签名步骤）
      - name: Ensure debug keystore
        run: |
          KS="$HOME/.android/debug.keystore"
          if [ ! -f "$KS" ]; then
            KT=$(which keytool 2>/dev/null || echo "${JAVA_HOME}/bin/keytool")
            mkdir -p "$(dirname "$KS")"
            "$KT" -genkeypair -v \
              -keystore "$KS" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -noprompt
          fi

      - name: Build APKs (debug + release)
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: puremusic-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
